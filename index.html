<!DOCTYPE html>
  <html lang="es">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Maxxi-Millian | Portafolio Artistico</title>
      <style>
          body, html {
              margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
                        overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
}
        .container {
                      text-align: center;
            z-index: 10;
}
        h1 {
                      font-size: 5rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
}
        p {
                      font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
}
        .btn {
                      padding: 15px 40px;
            font-size: 1rem;
            color: #000;
            background-color: #fff;
                          text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
}
        .btn:hover {
                      background-color: #ccc;
                      transform: scale(1.05);
}
        .background-elements {
                      position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
}
        .circle {
                      position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
}
        .circle-1 {
            width: 300px;
            height: 300px;
            background: #ff0055;
                        top: 10%;
            left: 15%;
            animation: move 20s infinite alternate;
        }
        .circle-2 {
            width: 400px;
            height: 400px;
            background: #0088ff;
            bottom: 10%;
            right: 15%;
            animation: move 25s infinite alternate-reverse;
        }
        @keyframes move {
                      from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
}
    </style>
              </head>
              <body>
                  <div class="background-elements">
                      <div class="circle circle-1"></div>
                      <div class="circle circle-2"></div>
                  </div>
                  <div class="container">
                      <h1>MAXXI-MILLIAN</h1>
                      <p>Explorando los limites de la percepcion visual a traves del arte digital y la expresion cromatica.</p>
                      <a href="#proyectos-grid" class="btn" target="_parent">Ver Galeria</a>
                  </div>
              </body>
              </html>
